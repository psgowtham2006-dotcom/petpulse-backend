server:
  port: 8080

spring:
  application:
    name: petpulse
  profiles:
    default: embedded
  datasource:
    url: jdbc:h2:file:./data/petpulse_db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

petpulse:
  jwt:
    secret: PeakPerform2024SuperSecretKeyForHmacSHA256SigningAtLeast256BitsLong
    expiration: 86400000
  upload-path: ./uploads/

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    enabled: true
